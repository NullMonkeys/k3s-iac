---
- name: Ensure git is installed
  ansible.builtin.package:
    name: git
    state: present

- name: Install Kubernetes Python library (Debian)
  ansible.builtin.apt:
    name: python3-kubernetes
    state: present
    update_cache: true
  when: ansible_facts['os_family'] == 'Debian'

- name: Install Kubernetes Python library (RedHat)
  ansible.builtin.pip:
    name: kubernetes
    state: present
    executable: pip3
    extra_args: "--break-system-packages"
  when: ansible_facts['os_family'] == 'RedHat'

- name: Clean up any previous GitOps repo clones
  ansible.builtin.file:
    path: "{{ argocd_gitops_repo_tmp_path }}"
    state: absent

- name: Close GitOps repo
  ansible.builtin.git:
    repo: "{{ argocd_gitops_repo_url }}"
    dest: "{{ argocd_gitops_repo_tmp_path }}"
    version: "{{ argocd_gitops_repo_branch }}"
    depth: 1

- name: Create argocd namespace
  kubernetes.core.k8s:
    name: argocd
    api_version: v1
    kind: Namespace
    state: present
    kubeconfig: "{{ argocd_kubeconfig_path }}"

- name: Create infisical-operator-system namespace
  kubernetes.core.k8s:
    name: infisical-operator-system
    api_version: v1
    kind: Namespace
    state: present
    kubeconfig: "{{ argocd_kubeconfig_path }}"

- name: Inject Infisical Universal Auth Credentials (Secret Zero)
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ argocd_kubeconfig_path }}"
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: universal-auth-credentials
        namespace: infisical-operator-system
      type: Opaque
      stringData:
        clientId: "{{ infisical_client_id }}"
        clientSecret: "{{ infisical_client_secret }}"

- name: Apply argocd manifests
  ansible.builtin.shell: >
    kubectl apply -k {{ argocd_gitops_repo_tmp_path }}/{{ argocd_kustomize_path }}
    --server-side
    --force-conflicts
  environment:
    KUBECONFIG: "{{ argocd_kubeconfig_path }}"
  register: argocd_kustomize_apply
  changed_when: "'created' in argocd_kustomize_apply.stdout or 'configured' in argocd_kustomize_apply.stdout"

- name: Wait for Argo CD deployments to be ready
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    namespace: argocd
    name: "{{ item }}"
    kubeconfig: "{{ argocd_kubeconfig_path }}"
  register: argocd_deploy
  until: >
    argocd_deploy.resources | length > 0 and
    (argocd_deploy.resources[0].status.readyReplicas | default(0) | int) >=
    (argocd_deploy.resources[0].spec.replicas | default(1) | int)
  retries: 60
  delay: 5
  loop:
    - argocd-server
    - argocd-repo-server
    - argocd-dex-server

- name: Wait for Argo CD application controller StatefulSet to be ready
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: StatefulSet
    namespace: argocd
    name: argocd-application-controller
    kubeconfig: "{{ argocd_kubeconfig_path }}"
  register: argocd_sts
  until: >
    argocd_sts.resources | length > 0 and
    (argocd_sts.resources[0].status.readyReplicas | default(0) | int) >=
    (argocd_sts.resources[0].spec.replicas | default(1) | int)
  retries: 60
  delay: 5

- name: Wait for Argo CD Application CRD to exist
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: applications.argoproj.io
    kubeconfig: "{{ argocd_kubeconfig_path }}"
  register: argocd_application_crd
  until: argocd_application_crd.resources | length > 0
  retries: 30
  delay: 2

- name: Apply Argo CD app-of-apps root application
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ argocd_kubeconfig_path }}"
    src: "{{ argocd_gitops_repo_tmp_path }}/{{ argocd_root_app_path }}"
    server_side_apply:
      field_manager: ansible
      force_conflicts: true
