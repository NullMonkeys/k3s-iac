---
- name: Check if Tailscale is installed
  ansible.builtin.stat:
    path: /usr/bin/tailscale
  register: tailscale_installed

- name: Download Tailscale install script
  ansible.builtin.get_url:
    url: https://tailscale.com/install.sh
    dest: /tmp/tailscale-install.sh
    mode: "0755"
  when: not tailscale_installed.stat.exists

- name: Install Tailscale from official script
  ansible.builtin.command: /bin/sh /tmp/tailscale-install.sh
  args:
    creates: /usr/bin/tailscale
  when: not tailscale_installed.stat.exists
  changed_when: not tailscale_installed.stat.exists

- name: Check Tailscale login status
  ansible.builtin.command: tailscale status
  changed_when: false
  failed_when: false
  register: tailscale_status

- name: Run Tailscale up (for new nodes)
  ansible.builtin.command: tailscale up --authkey={{ tailscale_authkey }} --accept-routes --accept-dns=false
  when: tailscale_status.rc != 0
  changed_when: true

- name: Update Tailscale settings (for existing nodes)
  ansible.builtin.command: tailscale set --accept-routes --accept-dns=false
  when: tailscale_status.rc == 0
  changed_when: true

- name: Enable IPv4 forwarding for Tailscale subnet routing
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    sysctl_file: /etc/sysctl.d/99-tailscale.conf
    state: present
    reload: yes
  notify: Restart tailscaled
