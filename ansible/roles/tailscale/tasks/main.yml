---
- name: Check if Tailscale is installed
  ansible.builtin.stat:
    path: /usr/bin/tailscale
  register: tailscale_installed

- name: Install Tailscale from official script
  ansible.builtin.shell: curl -fsSL https://tailscale.com/install.sh | sh
  args:
    executable: /bin/sh
  when: not tailscale_installed.stat.exists

- name: Check Tailscale login status
  ansible.builtin.command: tailscale status
  changed_when: false
  failed_when: false
  register: tailscale_status

- name: Run Tailscale up (for new nodes)
  ansible.builtin.command: tailscale up --authkey={{ tailscale_authkey }} --accept-routes --accept-dns=false
  when: tailscale_status.rc != 0
  changed_when: true

- name: Update Tailscale settings (for existing nodes)
  ansible.builtin.command: tailscale set --accept-routes --accept-dns=false
  when: tailscale_status.rc == 0
  changed_when: true
